<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Builder - Projeto Engenharia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="builder" class="page active">
        <nav class="sidebar-ia">

            <div class="top-section">

                <h3>Istos Chat IA</h3>

                <div class="chat-box" id="chat-box">
                    <div class="msg-ai">
                        Olá! Eu sou a Istos AI. Como posso projetar seu site hoje?
                    </div>
                </div>

                <div class="chat-input-wrapper">
                    <input type="text"
                           id="ai-input"
                           autocomplete="off"
                           placeholder="Ex: 'Crie um botão neon'...">
                </div>

            </div>

            <div class="bottom-section">

                <h3>Widgets</h3>

                <div class="widgets-container">

                    <div class="widget" onclick="addElement('Texto')">
                        <i data-lucide="type"></i>
                        <span>Texto</span>
                    </div>

                    <div class="widget" onclick="addElement('Botão')">
                        <i data-lucide="mouse-pointer-2"></i>
                        <span>Botão</span>
                    </div>

                    <div class="widget" onclick="addElement('Card')">
                        <i data-lucide="layout"></i>
                        <span>Card</span>
                    </div>

                </div>
            
            </div>
        
        </nav>

        <main class="canvas-area">

            <header class="canvas-top">

                <a href="inicio.html" class="btn-back">
                    ← Voltar
                </a>

                <span class="editor-title">
                    Editor Istos Pro
                </span>

            </header>

            <div class="drop-zone" id="canvas">
                <div class="placeholder-text">
                    Clique em um widget ou peça para a Istos AI.
                </div>
            </div>

            <aside class="properties-panel" id="editor-side">

                <h4>Editor de Elemento</h4>

                <div id="controls">
                    <p class="no-selection-msg">
                        Selecione um item no canvas para editar.
                    </p>
                </div>

            </aside>

        </main>

    </section>
    <script src="script.js"></script>
</body>
